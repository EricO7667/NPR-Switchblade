schema: raw_table

description: >
  Tabular data where the correct header row has been detected and
  applied, but headers are not yet normalized.

guarantees:
  - payload.data is List[dict]
  - dict keys come from a detected header row
  - row order below header is preserved

may_contain:
  - metadata.transform.header_row_index
  - metadata.transform.dropped_rows_count

must_not_contain:
  - normalized column names
  - parsed component attributes

allowed_next:
  - normalized
