schema: parsed_parts

description: >
  Rows enriched with parsed component meaning derived from textual
  descriptions. Parsing is best-effort and component-type–specific.

guarantees:
  - payload.data is List[dict]
  - each row has a component_type field
  - parsing was attempted for every row

may_contain:
  # Value fields (component-specific)
  - value
  - resistance_ohms
  - capacitance_f
  - inductance_h

  # Electrical ratings
  - voltage
  - current
  - power
  - wattage

  # Classification
  - subtype
  - dielectric
  - channel
  - polarity
  - color
  - lens

  # Mechanical
  - package
  - mount

  # Diagnostics
  - parsing_warnings

must_not_contain:
  - inventory match results
  - confidence scores
  - report formatting fields

allowed_next:
  - matched_results
