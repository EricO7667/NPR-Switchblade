# ==========================================================
# PIPELINE CONFIGURATION
# ----------------------------------------------------------
# Ordered list of bricks executed by the runner.
# Each entry defines:
#   - name: the registered brick identifier
#   - config: parameters specific to that brick
# ==========================================================

meta:
  user: "tester"
  environment: "local"

pipeline:
  - name: importer_excel
    config:
      path: ./data/bom.xlsx

  - name: header_locator
    config:
      max_scan_rows: 25
      min_non_empty_ratio: 0.5

  - name: resolver_headers
    config:
      header_map:
        "Item #": item_number
        "Part Number": part_number
        "Description": description

  - name: parser_enrich
    config:
      description_field: description

